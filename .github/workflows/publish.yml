name: Publish to GitHub Packages

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'
    
    - name: Pack NuGet package
      run: dotnet pack encodingChange/encodingChange.csproj --configuration Release -p:PackageVersion=1.0.1 --output nupkgs
    
    - name: List files (debug)
      run: dir nupkgs
    
    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push "nupkgs/*.nupkg" \
          --source "https://nuget.pkg.github.com/frensqq/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --skip-duplicate