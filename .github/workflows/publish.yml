name: Publish to GitHub Packages

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release

    - name: Pack
      run: dotnet pack --configuration Release --output ./nupkgs
    
    - name: Publish to GitHub Packages
      run: dotnet nuget push "nupkgs/Frensqq.EncodingConvert.1.0.3.nupkg" --source "https://nuget.pkg.github.com/frensqq/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}